<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://unpkg.com;
  connect-src 'self' ws: wss:;
  img-src 'self' data: blob:;
  style-src 'self' 'unsafe-inline';
  frame-ancestors 'none';
">
<title>Wison-RBI</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --accent: #58a6ff; --text: #e6edf3; --text-dim: #8b949e;
    --red: #f85149; --green: #3fb950;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}

  #toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
  #toolbar input{flex:1;height:32px;padding:0 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;outline:none}
  #toolbar input:focus{border-color:var(--accent)}
  #toolbar button{width:32px;height:32px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:6px;cursor:pointer;font-size:15px}
  #toolbar button:hover{background:var(--border)}
  #canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative}
  #remote-canvas{display:block;cursor:crosshair}
  #loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);pointer-events:none}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  #statusbar{display:flex;align-items:center;gap:18px;padding:5px 14px;background:var(--surface);border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
  .dot.online{background:var(--green)}.dot.offline{background:var(--red)}
  #status-text{flex:1}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100vh">

<div id="toolbar">
  <button onclick="doNavigate()" title="前往">→</button>
  <input id="url-input" type="text" value="https://example.com" placeholder="输入 URL" autocomplete="off" spellcheck="false">
  <button onclick="doReload()" title="刷新">↻</button>
  <span style="margin-left:auto;font-size:12px;color:var(--text-dim)" id="conn-status">未连接</span>
</div>

<div id="canvas-wrap">
  <canvas id="remote-canvas"></canvas>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div style="font-size:13px;color:var(--text-dim)" id="loading-text">正在连接...</div>
  </div>
</div>

<div id="statusbar">
  <span><span id="status-dot" class="dot offline"></span><span id="status-text">等待连接</span></span>
  <span>FPS: <strong id="fps">—</strong></span>
  <span>BW: <strong id="bw">—</strong> KB/s</span>
  <span id="ftype"></span>
</div>

<script src="protocol/src/constants.js"></script>
<script src="protocol/src/decoder.js"></script>
<script src="protocol/src/validator.js"></script>
<script src="https://unpkg.com/canvaskit-wasm@0.39.1/bin/canvaskit.js"
        integrity="sha384-fI05zMq1iqtMKmiNT7JCzYOcSb4t+rq+qzNsqpWPoMVMa06n9sgUzrT9oxbFGm0m"
        crossorigin="anonymous"></script>
<script src="client/src/frame-buffer.js"></script>
<script src="client/src/connection.js"></script>
<script src="client/src/renderer.js"></script>
<script src="client/src/hid-capture.js"></script>

<script>
(async function main() {
  const canvas = document.getElementById('remote-canvas');
  const urlInput = document.getElementById('url-input');
  const loading = document.getElementById('loading-overlay');
  const loadText = document.getElementById('loading-text');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const fpsEl = document.getElementById('fps');
  const bwEl = document.getElementById('bw');
  const ftypeEl = document.getElementById('ftype');
  const connStatus = document.getElementById('conn-status');

  const viewport = { width: 1280, height: 720 };
  canvas.width = viewport.width;
  canvas.height = viewport.height;

  // Fit canvas
  function fitCanvas() {
    const wrap = document.getElementById('canvas-wrap');
    const ratio = viewport.width / viewport.height;
    let w = wrap.clientWidth, h = w / ratio;
    if (h > wrap.clientHeight) { h = wrap.clientHeight; w = h * ratio; }
    canvas.style.width = Math.floor(w) + 'px';
    canvas.style.height = Math.floor(h) + 'px';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  // Stats
  let fpsCounter = 0, bytesCounter = 0, statsTs = performance.now();
  function updateStats() {
    const elapsed = (performance.now() - statsTs) / 1000;
    fpsEl.textContent = Math.round(fpsCounter / elapsed);
    bwEl.textContent = Math.round((bytesCounter / elapsed) / 1024);
    fpsCounter = 0; bytesCounter = 0; statsTs = performance.now();
  }
  setInterval(updateStats, 1000);

  // Connection
  const wsUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws';
  const conn = new Connection(wsUrl, { reconnectBaseMs: 1000, reconnectMaxMs: 30000, reconnectMaxAttempts: 5 });

  conn.onDisconnect(() => {
    statusDot.className = 'dot offline';
    statusText.textContent = '已断开';
    connStatus.textContent = '重连中...';
  });
  conn.onReconnect(() => {
    statusDot.className = 'dot online';
    statusText.textContent = '已连接';
    connStatus.textContent = '已连接';
    loadText.textContent = '正在加载页面...';
    loading.style.display = 'flex';
    conn.sendControl({ type: 'start', url: urlInput.value });
  });

  // Renderer (needs CanvasKit)
  loadText.textContent = '正在加载 CanvasKit...';
  const canvasKit = await CanvasKitInit({ locateFile: (f) => 'https://unpkg.com/canvaskit-wasm@0.39.1/bin/' + f });
  loadText.textContent = '正在连接服务端...';

  const renderer = new Renderer(canvas, canvasKit, {
    onRequestKeyframe: () => {
      console.warn('[wison] Requesting keyframe due to repeated validation failures');
      conn.sendControl({ type: 'request_keyframe' });
    }
  });

  // Frame buffer (for HID coordinate conversion)
  const frameBuf = new FrameBuffer(64);

  conn.onFrame((data) => {
    const result = renderer.render(data);
    if (result.rendered && result.meta) {
      frameBuf.push(result.meta);
      ftypeEl.textContent = result.meta.tileCount === 1 ? 'KEYFRAME' : 'DIFF';
    }
    if (result.rendered) {
      loading.style.display = 'none';
      fpsCounter++;
      bytesCounter += data.byteLength;
    }
  });

  conn.onStatus((msg) => {
    if (msg.url) urlInput.value = msg.url;
    if (msg.title) document.title = msg.title + ' — Wison-RBI';
    if (!msg.loading) loading.style.display = 'none';
  });

  // HID capture
  const hid = new HIDCapture(canvas, {
    onEvent: (buf) => conn.sendHID(buf),
    getCurrentFrameId: () => renderer.currentFrameId,
    viewport,
  });

  // UI actions
  window.doNavigate = () => {
    let url = urlInput.value.trim();
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    urlInput.value = url;
    loading.style.display = 'flex';
    loadText.textContent = '正在导航...';
    conn.sendControl({ type: 'navigate', url });
  };
  window.doReload = () => {
    loading.style.display = 'flex';
    loadText.textContent = '正在刷新...';
    conn.sendControl({ type: 'navigate', url: urlInput.value });
  };
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') window.doNavigate(); });

  // Clipboard paste
  document.addEventListener('paste', (e) => {
    if (document.activeElement !== canvas) return;
    const text = e.clipboardData?.getData('text/plain') || '';
    if (text) conn.sendControl({ type: 'text', value: text });
  });

  // Start
  conn.connect();
  connStatus.textContent = '连接中...';
  statusDot.className = 'dot online';
  statusText.textContent = '连接中';
})();
</script>
</body>
</html>
